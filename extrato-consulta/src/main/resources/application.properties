quarkus.application.name=extrato-consulta
quarkus.http.port=8083
quarkus.http.test-port=0

# --- Cache do extrato consolidado (Inc-3 / US-06, ADR-006) ---------------------
# Caffeine em processo, chave = (cliente x competência).
# TTL = 5 min = meta de frescor da US-05: invalidação perdida nunca deixa o
# dado mais velho que a meta.
quarkus.cache.caffeine."extrato-consolidado".expire-after-write=5m

# --- Fonte no cache miss: API interna da consolidação (ADR-006) ----------------
# Par do contract test (Sessão 6, decisão 2 — PACT no Inc-5).
quarkus.rest-client.consolidacao.url=http://localhost:8082
# Testes: a fonte HTTP é substituída por dublê em memória (@Mock); URL inerte.
%test.quarkus.rest-client.consolidacao.url=http://localhost:65535

# --- Invalidação por evento posicao-atualizada (US-06/US-10) -------------------
# Consumidor idempotente por natureza (invalidar 2x = invalidar 1x) — premissa
# da Sessão 6, decisão 3. Testes: canal trocado pelo in-memory (RecursosEmMemoria).
#
# BROADCAST de invalidação (ADR-006, nota 11/07): consumer group ÚNICO por
# instância (${quarkus.uuid}) — com N réplicas da consulta, TODAS recebem o
# evento e invalidam o próprio Caffeine (correção garantida em escala
# horizontal; compartilhar hits continua trade-off documentado). `latest`:
# invalidação de histórico não interessa a uma instância recém-nascida (o
# cache dela nasce frio); evento perdido enquanto a instância estava fora é
# coberto pelo TTL (salvaguarda da US-06).
mp.messaging.incoming.posicao-atualizada-in.connector=smallrye-kafka
mp.messaging.incoming.posicao-atualizada-in.topic=posicao-atualizada
mp.messaging.incoming.posicao-atualizada-in.group.id=${quarkus.uuid}
mp.messaging.incoming.posicao-atualizada-in.auto.offset.reset=latest

%test.quarkus.kafka.devservices.enabled=false

# --- Atualizar sob demanda com limite por cliente (US-07 / Sessão 6, decisão 5) -
consulta.atualizar-sob-demanda.intervalo-minimo=30s
%test.consulta.atualizar-sob-demanda.intervalo-minimo=2s

# --- Disjuntor do cache miss (ADR-007, nota 11/07) ------------------------------
# Produção usa os valores da anotação (volume 8, ratio 0.5, delay 10s);
# testes encurtam para provar abertura/fechamento sem esperar.
%test.br.com.escalacaotech.extrato.consulta.FonteResiliente/posicoes/CircuitBreaker/requestVolumeThreshold=4
%test.br.com.escalacaotech.extrato.consulta.FonteResiliente/posicoes/CircuitBreaker/delay=300

# --- Observabilidade (Inc-6 / US-12) -------------------------------------------
# Logs JSON estruturados no plano A/prod (MDC vira campo -> correlationId);
# console legível com o id em dev/teste.
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p corr=%X{correlationId} [%c{2.}] %s%e%n
%test.quarkus.log.console.format=%d{HH:mm:ss} %-5p corr=%X{correlationId} [%c{2.}] %s%e%n

# Próximos incrementos deste serviço:
# - trilha de auditoria de acesso (quem/qual cliente/quando/canal — US-12)
# - contract test consulta <-> consolidação (Inc-5)

# --- Swagger UI (demo/arguição) — incluído também fora do dev mode ------------
quarkus.swagger-ui.always-include=true
