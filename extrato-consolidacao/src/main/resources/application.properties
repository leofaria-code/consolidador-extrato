quarkus.application.name=extrato-consolidacao
quarkus.http.port=8082
quarkus.http.test-port=0

# --- Consumo do tópico de ingestão (US-01/US-02) ------------------------------
# Perfil A (padrão): Dev Services sobe um broker Kafka via Docker em dev/test.
# Testes: canal trocado pelo connector in-memory (ver RecursosEmMemoria) — suite
#   pura-JVM, sem Docker (perfil B, critério 6).
mp.messaging.incoming.lancamentos-in.connector=smallrye-kafka
mp.messaging.incoming.lancamentos-in.topic=lancamentos-recebidos
mp.messaging.incoming.lancamentos-in.group.id=extrato-consolidacao
mp.messaging.incoming.lancamentos-in.auto.offset.reset=earliest

# --- Resiliência do consumo (Inc-4 / US-08, ADR-007) ---------------------------
# Esgotadas as 3 retentativas em processo (@Retry no consumidor), a mensagem vai
# à DLQ com a causa nos headers (dead-letter-reason/-cause do connector Kafka).
mp.messaging.incoming.lancamentos-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.lancamentos-in.dead-letter-queue.topic=lancamentos-recebidos-dlq
# Falha de DESERIALIZAÇÃO acontece ANTES da mensagem existir — sem handler, o
# connector re-tenta o poll para sempre e trava a partição (achado do plano A,
# 11/07 — ver uso-de-ia.md). O handler encaminha os bytes crus à mesma DLQ.
mp.messaging.incoming.lancamentos-in.value-deserialization-failure-handler=falha-deserializacao-lancamentos
mp.messaging.outgoing.lancamentos-dlq-out.connector=smallrye-kafka
mp.messaging.outgoing.lancamentos-dlq-out.topic=lancamentos-recebidos-dlq
mp.messaging.outgoing.lancamentos-dlq-out.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer
# Testes: o connector in-memory não tem DLQ (recurso do broker — plano A prova
# esse trecho, ADR-003); "ignore" preserva o comportamento observável da US-08:
# a mensagem esgotada sai do caminho e o fluxo segue.
%test.mp.messaging.incoming.lancamentos-in.failure-strategy=ignore
# Testes: retentativas reais, intervalos encurtados (50ms -> 100ms -> 200ms).
# (a política vive em ProcessadorLancamentos desde o Inc-6 — o consumidor
#  gerencia ack/correlação e o processador, retry/transação)
%test.br.com.escalacaotech.extrato.consolidacao.ProcessadorLancamentos/processar/Retry/delay=50
%test.br.com.escalacaotech.extrato.consolidacao.ProcessadorLancamentos/processar/Retry/delayUnit=MILLIS
%test.br.com.escalacaotech.extrato.consolidacao.ProcessadorLancamentos/processar/Retry/jitter=10

%test.quarkus.kafka.devservices.enabled=false

# --- Base segregada de posições (Inc-2 / US-05, ADR-002/ADR-004) --------------
# Plano A: db-kind=postgresql sem URL -> Dev Services sobe Postgres via Docker.
# Testes: H2 em memória com URL explícita (desliga Dev Services de banco) —
#   suite pura-JVM (ADR-003). O schema é gerado do modelo em dev/test.
quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:consolidacao;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# --- Fila de reconsolidação (Inc-4 / US-09, ADR-007) — RabbitMQ ----------------
# Fila de TRABALHO (producer/consumer, não publica-assina): o "guichê" da
# Sessão 4 — max-outstanding-messages=1 garante consumo um a um.
# Plano A: Dev Services sobe RabbitMQ via Docker. Testes: canais in-memory.
mp.messaging.outgoing.reconsolidacao-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.reconsolidacao-out.exchange.name=reconsolidacao
mp.messaging.incoming.reconsolidacao-in.connector=smallrye-rabbitmq
mp.messaging.incoming.reconsolidacao-in.exchange.name=reconsolidacao
mp.messaging.incoming.reconsolidacao-in.queue.name=reconsolidacao
mp.messaging.incoming.reconsolidacao-in.max-outstanding-messages=1
# Falha esgotada -> DLQ do Rabbit (dead-letter exchange, ADR-007)
mp.messaging.incoming.reconsolidacao-in.failure-strategy=reject
mp.messaging.incoming.reconsolidacao-in.auto-bind-dlq=true
mp.messaging.incoming.reconsolidacao-in.dead-letter-queue-name=reconsolidacao-dlq
# O connector NÃO declara o dead-letter exchange por padrão — sem isto, o bind
# da DLQ falha com 404 (no exchange 'DLX') e o canal morre após as retentativas
# de conexão. Achado da validação do plano A em 10/07 (ver uso-de-ia.md).
mp.messaging.incoming.reconsolidacao-in.dlx.declare=true
%test.mp.messaging.incoming.reconsolidacao-in.failure-strategy=ignore
%test.quarkus.rabbitmq.devservices.enabled=false

# --- Evento posicao-atualizada via outbox (Inc-2 / US-10, ADR-005) ------------
# Publicador @Scheduled varre evento_pendente e publica no tópico; marca
# publicado_em só após o ack do broker (entrega "pelo menos uma vez").
consolidacao.outbox.intervalo=2s
%test.consolidacao.outbox.intervalo=1s
mp.messaging.outgoing.posicao-atualizada-out.connector=smallrye-kafka
mp.messaging.outgoing.posicao-atualizada-out.topic=posicao-atualizada

# --- Observabilidade (Inc-6 / US-12) -------------------------------------------
# Logs JSON estruturados no plano A/prod (MDC vira campo -> correlationId);
# console legível com o id em dev/teste.
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p corr=%X{correlationId} [%c{2.}] %s%e%n
%test.quarkus.log.console.format=%d{HH:mm:ss} %-5p corr=%X{correlationId} [%c{2.}] %s%e%n

# Próximos incrementos deste serviço:
# - expurgo por consentimento (US-11)

# --- Swagger UI (demo/arguição) — incluído também fora do dev mode ------------
quarkus.swagger-ui.always-include=true
