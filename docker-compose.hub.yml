# ─────────────────────────────────────────────────────────────────────────────
# Segunda via de execução: rodar a stack COMPLETA puxando imagens do Docker Hub,
# SEM clonar o repo, SEM Maven, SEM JDK — só Docker. (ADR-009)
#
# Isto NÃO substitui o docker-compose.yml (build-from-source, usado na demo/CI):
# é uma opção adicional para quem só quer executar o projeto já empacotado.
#
#   docker compose -f docker-compose.hub.yml up -d
#
# Puxa do namespace publicado (leofariacode) por padrão — sem variável, funciona
# igual em Windows/Linux/macOS. Se você forkou e publicou no SEU namespace:
#   Linux/macOS:  HUB_NS=seu-usuario docker compose -f docker-compose.hub.yml up -d
#   Windows (PS): $env:HUB_NS="seu-usuario"; docker compose -f docker-compose.hub.yml up -d
#
# Publicar/atualizar as imagens: ./publicar-hub.ps1 (ou .sh) — ver README.
# Fixe uma versão com TAG=1.0.0 (default: latest).
#
# Portas idênticas à via principal: 8081 ingestão · 8082 consolidação ·
# 8083 consulta · 8084 réplica · 15672 RabbitMQ · 9090 Prometheus · 3000 Grafana · 8080 Kafka UI.
# ─────────────────────────────────────────────────────────────────────────────
services:

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20

  # UI do Kafka (imagem pública, nada a publicar): inspecionar tópicos, mensagens,
  # consumers e offsets. Espelha o docker-compose.yml (build-from-source).
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: consolidador-extrato-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 20

  postgres:
    image: postgres:17-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: consolidacao
      POSTGRES_USER: extrato
      POSTGRES_PASSWORD: extrato
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extrato -d consolidacao"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Os 3 serviços + réplica: imagens publicadas (jar + JRE 25 já assados dentro).
  # HUB_NS é obrigatório; falha com mensagem clara se não for definido.
  ingestao:
    image: ${HUB_NS:-leofariacode}/extrato-ingestao:${TAG:-latest}
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  consolidacao:
    image: ${HUB_NS:-leofariacode}/extrato-consolidacao:${TAG:-latest}
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/consolidacao
      QUARKUS_DATASOURCE_USERNAME: extrato
      QUARKUS_DATASOURCE_PASSWORD: extrato
      QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY: drop-and-create
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  consulta:
    image: ${HUB_NS:-leofariacode}/extrato-consulta:${TAG:-latest}
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_REST_CLIENT_CONSOLIDACAO_URL: http://consolidacao:8082
    depends_on:
      kafka:
        condition: service_healthy
      consolidacao:
        condition: service_started

  # Réplica: REUSA a imagem da consulta (broadcast de invalidação — ADR-006 nota).
  consulta-replica:
    image: ${HUB_NS:-leofariacode}/extrato-consulta:${TAG:-latest}
    ports:
      - "8084:8083"
    environment:
      QUARKUS_HTTP_PORT: "8083"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_REST_CLIENT_CONSOLIDACAO_URL: http://consolidacao:8082
    depends_on:
      kafka:
        condition: service_healthy
      consolidacao:
        condition: service_started

  # Observabilidade com config assada na imagem (ADR-009) — sem volumes, sem
  # depender de arquivos do repo. Fonte de verdade segue em infra/observabilidade/.
  prometheus:
    image: ${HUB_NS:-leofariacode}/extrato-prometheus:${TAG:-latest}
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: ${HUB_NS:-leofariacode}/extrato-grafana:${TAG:-latest}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
