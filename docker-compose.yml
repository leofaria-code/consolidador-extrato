# Demo da banca (plano A) — brokers reais + os 3 serviços (issue #9).
# Do zero com um comando: ./demo.ps1 (Windows) ou ./demo.sh (Linux/macOS).
# Ele roda `mvn -DskipTests package` e depois `docker compose up --build`.
#
# Portas no host: 8081 ingestão · 8082 consolidação · 8083 consulta · 8084 réplica da consulta
#                 15672 RabbitMQ Management (guest/guest) — ver a DLQ ao vivo
#                 9090 Prometheus · 3000 Grafana (dashboard da banca, sem login)
# Stack COMPLETA por padrão (decisão 11/07, revisão da ADR-008): quem roda
# `docker compose up` leva tudo — réplica e observabilidade deixaram de ser profiles.
services:

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "29092:29092"   # inspeção do HOST (Offset Explorer, kafka-ui, IntelliJ): localhost:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Dois listeners de dados: PLAINTEXT (interno, anunciado como kafka:9092 p/
      # os serviços) e EXTERNAL (anunciado como localhost:29092 p/ o host) —
      # mapear só a porta NÃO basta: o broker devolve o advertised.listener no
      # metadata, e "kafka:9092" não resolve fora da rede do compose.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      # http://localhost:8080 — inspecionar topicos, mensagens, consumers e offsets.
      # Porta ocupada? KAFKA_UI_PORT=8085 docker compose up -d kafka-ui
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: consolidador-extrato-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "15672:15672"   # UI de management — inspecionar a fila reconsolidacao e a DLQ
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 20

  postgres:
    image: postgres:17-alpine
    ports:
      - "15432:5432"   # inspeção do HOST (psql/IntelliJ): localhost:15432, extrato/extrato
    environment:
      POSTGRES_DB: consolidacao
      POSTGRES_USER: extrato
      POSTGRES_PASSWORD: extrato
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extrato -d consolidacao"]
      interval: 5s
      timeout: 5s
      retries: 20

  ingestao:
    build:
      context: ./extrato-ingestao
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  consolidacao:
    build:
      context: ./extrato-consolidacao
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/consolidacao
      QUARKUS_DATASOURCE_USERNAME: extrato
      QUARKUS_DATASOURCE_PASSWORD: extrato
      # demo: schema gerado do modelo a cada subida (base descartável)
      QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY: drop-and-create
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  consulta:
    build:
      context: ./extrato-consulta
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_REST_CLIENT_CONSOLIDACAO_URL: http://consolidacao:8082
    depends_on:
      kafka:
        condition: service_healthy
      consolidacao:
        condition: service_started

  # Réplica da consulta para a demo de escala horizontal (ADR-006, nota 11/07):
  # broadcast de invalidação — as DUAS instâncias invalidam no mesmo evento.
  # Sobe por padrão desde 11/07 (antes: profile "escala").
  consulta-replica:
    build:
      context: ./extrato-consulta
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8084:8083"
    environment:
      QUARKUS_HTTP_PORT: "8083"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_REST_CLIENT_CONSOLIDACAO_URL: http://consolidacao:8082
    depends_on:
      kafka:
        condition: service_healthy
      consolidacao:
        condition: service_started

  # Observabilidade (ADR-008, revisada 11/07): Prometheus raspa /q/metrics dos
  # serviços e o Grafana abre o dashboard da banca sem login (viewer anônimo).
  # Sobe por padrão (antes: profile "observabilidade").
  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      # http://localhost:9090/targets — os 4 alvos do scrape. Se a 9090 já
      # estiver ocupada na sua máquina: PROMETHEUS_PORT=9091 docker compose ...
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/observabilidade/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.0
    ports:
      # http://localhost:3000 — dashboard "visão da banca". Porta ocupada?
      # GRAFANA_PORT=3001 docker compose ...
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./infra/observabilidade/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observabilidade/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
