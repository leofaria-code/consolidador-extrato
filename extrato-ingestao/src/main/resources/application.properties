quarkus.application.name=extrato-ingestao
quarkus.http.port=8081
quarkus.http.test-port=0

# --- Ingestão por tópico (US-01) ---------------------------------------------
# Canal de saída -> tópico Kafka `lancamentos-recebidos`.
# Perfil A (padrão): Dev Services sobe um broker Kafka via Docker em dev/test.
# Perfil B / testes: canal trocado pelo connector in-memory (ver RecursosEmMemoria);
#   Dev Services de Kafka desligado em teste para garantir suite Docker-free (critério 6).
mp.messaging.outgoing.lancamentos-out.connector=smallrye-kafka
mp.messaging.outgoing.lancamentos-out.topic=lancamentos-recebidos

%test.quarkus.kafka.devservices.enabled=false

# Próximos incrementos deste serviço:
# - verificação de consentimento vigente (US-04)
# - separação de inválidos para inspeção via DLQ (Incremento 4 / US-08)
